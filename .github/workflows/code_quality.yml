name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run clippy with optional async I/O features
        run: cargo clippy -p zmux --features tokio-io,futures-io --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build docs
        run: cargo doc --workspace --no-deps

      - name: Package core crate
        run: cargo package -p zmux

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect Qodana token
        id: qodana-token
        shell: bash
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        run: |
          if [[ -n "${QODANA_TOKEN}" ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "QODANA_TOKEN is not configured; skipping Qodana scan."
          fi

      - name: Qodana Scan
        if: steps.qodana-token.outputs.present == 'true'
        uses: JetBrains/qodana-action@v2026.1.0
        with:
          pr-mode: false
          args: --image jetbrains/qodana-rust:2026.1-eap
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: https://qodana.cloud
